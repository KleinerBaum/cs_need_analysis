[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "data",
    "images",
    "reports",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "F541"]

[tool.ruff.lint.per-file-ignores]
# Existing Summary-page references are triaged separately from the first gate.
"wizard_pages/08_summary.py" = ["F821"]

[tool.black]
target-version = ["py311"]
line-length = 88
include = '''
/(
    app
  | state
  | state_store
  | llm_error_mapping
  | model_capabilities
  | usage_utils
  | eures_mapping
  | scripts/check_repo_hygiene
)\.py$
'''
extend-exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.pytest_cache
  | \.ruff_cache
  | \.venv
  | __pycache__
  | data
  | images
  | reports
)/
'''

[tool.mypy]
python_version = "3.11"
files = [
    # Stage 2: app shell, state facade, and LLM error mapping helper.
    "app.py",
    "state.py",
    "state_store.py",
    "llm_error_mapping.py",
    "model_capabilities.py",
    "usage_utils.py",
    "summary_artifacts.py",
    "eures_mapping.py",
    "esco_matrix.py",
    "esco_offline_index.py",
    "esco_rag.py",
    "salary/benchmarks.py",
    "salary/engine.py",
    "salary/features_esco.py",
    "salary/mapping.py",
    "salary/scenario_lab_builders.py",
    "salary/scenarios.py",
    "salary/types.py",
    "ui_widget_state.py",
    "ux_copy_contract.py",
    "scripts/check_repo_hygiene.py",
]
ignore_missing_imports = true
follow_imports = "silent"
check_untyped_defs = false
disallow_untyped_defs = false
warn_unused_ignores = false

[tool.pyright]
pythonVersion = "3.11"
include = [
    # Stage 2: app shell, state facade, and LLM error mapping helper.
    "app.py",
    "state.py",
    "state_store.py",
    "llm_error_mapping.py",
    "model_capabilities.py",
    "usage_utils.py",
    "summary_artifacts.py",
    "eures_mapping.py",
    "esco_matrix.py",
    "esco_offline_index.py",
    "esco_rag.py",
    "salary/benchmarks.py",
    "salary/engine.py",
    "salary/features_esco.py",
    "salary/mapping.py",
    "salary/scenario_lab_builders.py",
    "salary/scenarios.py",
    "salary/types.py",
    "ui_widget_state.py",
    "ux_copy_contract.py",
    "scripts/check_repo_hygiene.py",
]
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "data",
    "images",
    "reports",
]
typeCheckingMode = "basic"
reportMissingImports = "none"
reportMissingTypeStubs = "none"

[tool.bandit]
exclude_dirs = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "data",
    "images",
    "reports",
    "tests",
]
