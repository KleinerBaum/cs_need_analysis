name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt

      - name: Check installed packages
        run: pip check

      - name: Compile Python sources
        run: python -m compileall app.py homepage_research.py job_extract_evidence.py job_extract_review_helpers.py summary_artifacts.py summary_esco.py summary_exports.py summary_facts.py summary_job_ad.py usage_events.py components config pages salary scripts tests wizard_pages

      - name: Run tests
        run: python -m pytest -q

      - name: OpenAI smoke dry-run
        run: python scripts/openai_smoke_test.py --mode all --ci-dry-run-if-no-key --json-only
