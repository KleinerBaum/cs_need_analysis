name: CI

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional Playwright Streamlit smoke tests on manual dispatch"
        required: false
        type: boolean
        default: false
      run_visual_regression:
        description: "Run optional Playwright screenshot capture on manual dispatch"
        required: false
        type: boolean
        default: false
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CS_ALERT_P95_LATENCY_MS: "8000"
  CS_ALERT_AVG_COST_USD: "0.01"
  CS_ALERT_FAILURE_RATE: "0.03"

jobs:
  qa:
    name: Lint and type checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Repository hygiene guard
        env:
          CS_I18N_RAW_UI_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: python scripts/check_repo_hygiene.py

      - name: Install QA dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -c constraints.txt

      - name: Ruff critical checks
        run: python -m ruff check .

      - name: Black scoped format check
        run: python -m black --check .

      - name: Mypy scoped baseline
        run: python -m mypy

      - name: Pyright scoped baseline
        run: python -m pyright

  contract:
    name: Fast contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-dev.txt -c constraints.txt

      - name: Prepare report directory
        run: mkdir -p reports/junit reports/coverage

      - name: Run contract tests
        run: |
          python -m pytest -q \
            tests/test_repo_contract_drift.py \
            tests/test_wizard_contract.py \
            tests/test_quality_gate_config.py \
            tests/test_public_page_links.py \
            tests/test_constants_import_contract.py \
            tests/test_schema_contracts.py \
            --junitxml=reports/junit/contract.xml

      - name: Publish contract summary
        if: ${{ always() }}
        run: python scripts/ci_junit_summary.py reports/junit/contract.xml "Contract"

      - name: Upload contract test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-contract-junit
          path: reports/junit/contract.xml
          if-no-files-found: warn
          retention-days: 14

  unit:
    name: Python unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-dev.txt -c constraints.txt

      - name: Prepare report directory
        run: mkdir -p reports/junit

      - name: Check installed packages
        run: pip check

      - name: Compile Python sources
        run: python -m compileall app.py homepage_research.py job_extract_evidence.py job_extract_review_helpers.py summary_artifacts.py summary_esco.py summary_exports.py summary_facts.py summary_job_ad.py usage_events.py components config pages salary scripts tests wizard_pages

      - name: Run unit tests
        run: |
          python -m pytest -q tests \
            --ignore=tests/e2e \
            --ignore=tests/apptest \
            --cov=. \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:reports/coverage/unit-coverage.xml \
            --cov-fail-under=35 \
            --junitxml=reports/junit/unit.xml

      - name: Publish unit summary
        if: ${{ always() }}
        run: python scripts/ci_junit_summary.py reports/junit/unit.xml "Unit"

      - name: OpenAI smoke dry-run
        run: |
          python scripts/openai_smoke_test.py \
            --mode all \
            --ci-dry-run-if-no-key \
            --json-only > reports/openai-smoke.json

      - name: Quality eval threshold gate
        run: |
          python scripts/run_quality_evals.py \
            --fixtures evals \
            --output reports/evals/summary.csv \
            --json-output reports/evals/summary.json \
            --enforce-thresholds

      - name: Deployment observability report
        if: ${{ always() }}
        run: |
          python scripts/ci_observability_report.py \
            --openai-smoke-json reports/openai-smoke.json \
            --eval-json reports/evals/summary.json \
            --output reports/observability/deployment-events.jsonl

      - name: Upload unit reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-unit-reports
          path: |
            reports/junit/unit.xml
            reports/coverage/unit-coverage.xml
            reports/openai-smoke.json
            reports/evals/summary.csv
            reports/evals/summary.json
            reports/observability/deployment-events.jsonl
          if-no-files-found: warn
          retention-days: 14

  apptest:
    name: Streamlit AppTest smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-dev.txt -c constraints.txt

      - name: Prepare report directory
        run: mkdir -p reports/junit

      - name: Run AppTest smoke tests
        run: python -m pytest -q tests/apptest --junitxml=reports/junit/apptest.xml

      - name: Publish AppTest summary
        if: ${{ always() }}
        run: python scripts/ci_junit_summary.py reports/junit/apptest.xml "AppTest"

      - name: Upload AppTest report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-apptest-junit
          path: reports/junit/apptest.xml
          if-no-files-found: warn
          retention-days: 14

  deployment_observability:
    name: OIDC-ready deployment observability
    needs:
      - unit
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write

    steps:
      - name: Download observability artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-unit-reports
          path: reports/from-ci

      - name: Emit structured deployment log
        run: |
          event_file="$(find reports/from-ci -name deployment-events.jsonl -print -quit || true)"
          if [ -n "$event_file" ]; then
            cat "$event_file"
          else
            printf '%s\n' '{"event_type":"deployment_event","status":"missing_observability_artifact"}'
          fi

  browser_smoke:
    name: Advisory Playwright browser smoke
    if: github.event_name != 'workflow_dispatch' || inputs.run_e2e == true
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-dev.txt -c constraints.txt
          pip install -r requirements-e2e.txt -c constraints.txt

      - name: Prepare report directory
        run: mkdir -p reports/junit

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run Streamlit browser smoke tests
        env:
          CS_RUN_E2E: "1"
          CS_E2E_PORT: "8765"
        run: python -m pytest -q tests/e2e --junitxml=reports/junit/browser-smoke.xml

      - name: Publish browser smoke summary
        if: ${{ always() }}
        run: python scripts/ci_junit_summary.py reports/junit/browser-smoke.xml "Browser smoke"

      - name: Upload browser smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-browser-smoke-junit
          path: reports/junit/browser-smoke.xml
          if-no-files-found: warn
          retention-days: 14

  visual_regression:
    name: Advisory Playwright visual screenshots
    if: github.event_name != 'workflow_dispatch' || inputs.run_visual_regression == true
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-dev.txt -c constraints.txt
          pip install -r requirements-e2e.txt -c constraints.txt

      - name: Prepare report directory
        run: mkdir -p reports/junit reports/visual-regression

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Capture wizard screenshots
        env:
          CS_RUN_E2E: "1"
          CS_E2E_PORT: "8766"
          CS_E2E_CAPTURE_SCREENSHOTS: "1"
        run: |
          python -m pytest -q tests/e2e/test_streamlit_wizard_smoke.py \
            --junitxml=reports/junit/visual-regression.xml

      - name: Publish visual regression summary
        if: ${{ always() }}
        run: python scripts/ci_junit_summary.py reports/junit/visual-regression.xml "Visual regression"

      - name: Upload visual regression artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-visual-regression-artifacts
          path: |
            reports/junit/visual-regression.xml
            reports/visual-regression/*.png
          if-no-files-found: warn
          retention-days: 14

  deployed_smoke:
    name: Deployed smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -c constraints.txt
          pip install -r requirements-e2e.txt -c constraints.txt

      - name: Prepare report directory
        run: mkdir -p reports/junit

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run deployed smoke test
        env:
          CS_RUN_DEPLOYED_SMOKE: "1"
        run: |
          python -m pytest -q tests/e2e/test_deployed_smoke.py \
            --junitxml=reports/junit/deployed-smoke.xml

      - name: Publish deployed smoke summary
        if: ${{ always() }}
        run: python scripts/ci_junit_summary.py reports/junit/deployed-smoke.xml "Deployed smoke"

      - name: Upload deployed smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-deployed-smoke-junit
          path: reports/junit/deployed-smoke.xml
          if-no-files-found: warn
          retention-days: 14

  security:
    name: Security and artifact scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"

      - name: Dependency review blocking scan
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-dev.txt -c constraints.txt
          pip install -r requirements-e2e.txt -c constraints.txt

      - name: Bandit blocking high and medium scan
        run: python -m bandit -c pyproject.toml -r . --severity-level medium --confidence-level medium

      - name: pip-audit dependency vulnerability scan
        run: python -m pip_audit --local --strict --progress-spinner off

      - name: Tracked artifact drift scan
        run: python scripts/check_tracked_artifacts.py
