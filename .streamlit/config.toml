[client]
showSidebarNavigation = false
toolbarMode = "auto"
showErrorDetails = "type"
showErrorLinks = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[theme]
base = "light"
baseFontSize = 16
baseRadius = "0.75rem"
showSidebarBorder = true

[theme.light]
primaryColor = "#2563EB"
backgroundColor = "#F4F7FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#334155"
borderColor = "#D9E2EC"

[theme.light.sidebar]
primaryColor = "#2563EB"
backgroundColor = "#16324F"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#FFFFFF"

[theme.dark]
primaryColor = "#7CC4FF"
backgroundColor = "#0A0A0A"
secondaryBackgroundColor = "#121212"
textColor = "#F5F5F5"
borderColor = "#232323"

[theme.dark.sidebar]
primaryColor = "#7CC4FF"
backgroundColor = "#050505"
secondaryBackgroundColor = "#121212"
textColor = "#F5F5F5"
