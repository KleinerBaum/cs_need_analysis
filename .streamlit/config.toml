[client]
showSidebarNavigation = false
toolbarMode = "auto"
showErrorDetails = "type"
showErrorLinks = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[theme]
base = "light"
baseFontSize = 16
baseRadius = "0.5rem"
showSidebarBorder = true

[theme.light]
primaryColor = "#2563EB"
backgroundColor = "#F6F8FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#172033"
borderColor = "#D6DEE8"

[theme.light.sidebar]
primaryColor = "#2563EB"
backgroundColor = "#12263A"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#FFFFFF"

[theme.dark]
primaryColor = "#3B82F6"
backgroundColor = "#0F141B"
secondaryBackgroundColor = "#181E27"
textColor = "#E8EDF3"
borderColor = "#2D3642"

[theme.dark.sidebar]
primaryColor = "#3B82F6"
backgroundColor = "#101820"
secondaryBackgroundColor = "#202938"
textColor = "#F8FAFC"
