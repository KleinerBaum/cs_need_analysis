[client]
showSidebarNavigation = false
toolbarMode = "auto"
showErrorDetails = "type"
showErrorLinks = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[server]
enableStaticServing = true

[theme]
base = "light"
baseFontSize = 16
baseRadius = "0.5rem"
showSidebarBorder = true

[theme.light]
primaryColor = "#1D4ED8"
backgroundColor = "#F4F7FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#142033"
borderColor = "#CAD6E2"

[theme.light.sidebar]
primaryColor = "#60A5FA"
backgroundColor = "#0B1724"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#F8FAFC"

[theme.dark]
primaryColor = "#60A5FA"
backgroundColor = "#0B111B"
secondaryBackgroundColor = "#111827"
textColor = "#F1F5F9"
borderColor = "#334155"

[theme.dark.sidebar]
primaryColor = "#60A5FA"
backgroundColor = "#07111F"
secondaryBackgroundColor = "#142033"
textColor = "#F8FAFC"
