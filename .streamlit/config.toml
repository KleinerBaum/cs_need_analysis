[client]
showSidebarNavigation = false
toolbarMode = "auto"
showErrorDetails = "type"
showErrorLinks = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[theme]
base = "light"
baseFontSize = 16
baseRadius = "0.75rem"
showSidebarBorder = true

[theme.light]
primaryColor = "#2563EB"
backgroundColor = "#F4F7FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#334155"
borderColor = "#D9E2EC"

[theme.light.sidebar]
primaryColor = "#2563EB"
backgroundColor = "#16324F"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#FFFFFF"

[theme.dark]
primaryColor = "#2563EB"
backgroundColor = "#0B1726"
secondaryBackgroundColor = "#152640"
textColor = "#E2E8F0"
borderColor = "#1E3A63"

[theme.dark.sidebar]
primaryColor = "#2563EB"
backgroundColor = "#0B1726"
secondaryBackgroundColor = "#152640"
textColor = "#F9FAFB"
